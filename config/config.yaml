# =============================================================================
# config/config.yaml
# Automated Business Intelligence Reporting System
# Platform : MS SQL Server 2019+ (T-SQL)
# Author   : Olayinka Somuyiwa
# =============================================================================

# ── Database — MS SQL Server ──────────────────────────────────────────────────
database:
  server:             .\SQLEXPRESS                              # SQL Server instance name or IP
  database:           bi_reporting_db                           # Target database name
  driver:             ODBC Driver 17 for SQL Server             # ODBC driver — or "ODBC Driver 17 for SQL Server"
  trusted_connection: true                                      # Windows Authentication
  # username: YOUR_USERNAME                                     # Uncomment for SQL Server auth
  # password: YOUR_PASSWORD                                     # Uncomment for SQL Server auth

# ── Pipeline Stage Toggles ────────────────────────────────────────────────────
pipeline:
  ingest:    true
  transform: true
  anomaly:   true
  report:    true

# ── Data Paths ────────────────────────────────────────────────────────────────
data:
  raw_path:       data/raw/sales_operations.csv
  processed_path: data/processed/

# ── Reporting Output ──────────────────────────────────────────────────────────
reporting:
  output_format:  xlsx
  output_path:    data/processed/
  include_charts: true

# ── Anomaly Detection ─────────────────────────────────────────────────────────
anomaly:
  zscore_threshold: 2.5
  iqr_multiplier:   1.5
  columns:
    - revenue
    - cost

# ── SQL File Paths ────────────────────────────────────────────────────────────
sql:
  schema_file:    sql/transformations/01_create_schema.sql
  staging_file:   sql/transformations/02_staging_layer.sql
  core_file:      sql/transformations/03_core_layer.sql
  reporting_file: sql/transformations/04_reporting_layer.sql
  views_dir:      sql/views/
  procedures_dir: sql/stored_procedures/

# ── Scheduling (SQL Server Agent) ─────────────────────────────────────────────
schedule:
  extraction_time:    "06:00"    # usp_DailyDataExtraction — SQL Server Agent
  transformation_time: "06:30"   # pipeline_runner.py — Python scheduler

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:   INFO
  log_dir: logs/
  db_log_table: dbo.pipeline_log   # Pipeline log written to SQL Server
